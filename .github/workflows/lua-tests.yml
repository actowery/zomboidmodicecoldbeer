name: CI

on:
  push:
    branches:
      - main
      - feature/**
      - hotfix/**
      - release/**
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Lua
        uses: leafo/gh-actions-lua@v11
        with:
          luaVersion: "5.4"

      - name: Show Lua version
        run: lua -v

      - name: Run repository checks
        run: |
          lua tests/test_lua_syntax.lua
          lua tests/test_lua_style.lua
          lua tests/test_repository_integrity.lua
          lua tests/test_cold_drink_config.lua
          lua tests/test_cold_drink_moodles_state.lua
          lua tests/test_translations.lua
